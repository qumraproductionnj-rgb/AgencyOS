name: Test + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Quality checks ────────────────────────────────────────────────────────
  test:
    name: Lint + Typecheck + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @agencyos/database generate

      - name: Lint (web)
        run: pnpm --filter web lint

      - name: Typecheck (web)
        run: pnpm --filter web typecheck

      - name: Lint (api)
        run: pnpm --filter api lint

      - name: Typecheck (api)
        run: pnpm --filter api typecheck

      - name: Tests (api)
        run: pnpm --filter api test --passWithNoTests

  # ── Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 600s
          script: |
            cd /app/agencyos
            bash scripts/deploy.sh

      - name: Notify Telegram — Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ <b>AgencyOS Deployed</b>%0ABranch: main%0ACommit: ${{ github.sha }}%0ABy: ${{ github.actor }}" \
            -d "parse_mode=HTML"

      - name: Notify Telegram — Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ <b>AgencyOS Deploy FAILED</b>%0ABranch: main%0ACommit: ${{ github.sha }}%0ABy: ${{ github.actor }}" \
            -d "parse_mode=HTML"
