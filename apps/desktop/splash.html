<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 400px; height: 300px;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    -webkit-app-region: drag;
    user-select: none;
  }
  .card {
    width: 360px; height: 260px;
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
  }
  .logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 900; color: #fff;
    animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 20px rgba(99,102,241,0.4); }
    to   { box-shadow: 0 0 40px rgba(139,92,246,0.8); }
  }
  .title { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 2px; }
  .subtitle { color: rgba(255,255,255,0.4); font-size: 12px; direction: rtl; }
  .dots { display: flex; gap: 6px; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(99,102,241,0.5);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); background: #6366f1; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">V</div>
    <div class="title">VISION OS</div>
    <div class="subtitle">جاري التحميل...</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
