# =============================================================
# Docker Compose for Local Development
# =============================================================
# Start: docker compose up -d
# Stop: docker compose down
# Logs: docker compose logs -f [service]
# Reset: docker compose down -v (DESTROYS DATA!)
# =============================================================

services:
  # -----------------------------------------------------------
  # PostgreSQL 16 — Main Database
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: agencyos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agencyos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      POSTGRES_DB: ${DB_NAME:-agencyos_dev}
      # Enable required extensions on init
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agencyos} -d ${DB_NAME:-agencyos_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agencyos_network

  # -----------------------------------------------------------
  # Redis 7 — Cache and Queue
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agencyos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agencyos_network

  # -----------------------------------------------------------
  # MailHog — Local SMTP server for testing emails
  # -----------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: agencyos_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI: http://localhost:8025
    networks:
      - agencyos_network

  # -----------------------------------------------------------
  # Meilisearch — Full-text search (used in Phase 3+)
  # -----------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: agencyos_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key_change_me}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - agencyos_network

  # -----------------------------------------------------------
  # MinIO — S3-compatible storage (alternative to R2 for offline dev)
  # -----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: agencyos_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-agencyos}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-dev_password_change_me}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console: http://localhost:9001
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - agencyos_network

  # -----------------------------------------------------------
  # Adminer — DB GUI (alternative to Prisma Studio)
  # -----------------------------------------------------------
  adminer:
    image: adminer:4.8.1
    container_name: agencyos_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"   # http://localhost:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      - postgres
    networks:
      - agencyos_network

# -------------------------------------------------------------
# Volumes (persistent data)
# -------------------------------------------------------------
volumes:
  postgres_data:
    name: agencyos_postgres_data
  redis_data:
    name: agencyos_redis_data
  meilisearch_data:
    name: agencyos_meilisearch_data
  minio_data:
    name: agencyos_minio_data

# -------------------------------------------------------------
# Network
# -------------------------------------------------------------
networks:
  agencyos_network:
    name: agencyos_network
    driver: bridge
