version: '3.9'

networks:
  agencyos_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agencyos_postgres
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB: agencyos_prod
      POSTGRES_USER: agencyos
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agencyos_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agencyos -d agencyos_prod']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agencyos_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - agencyos_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ── API (NestJS) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: agencyos_api
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agencyos_net
    expose:
      - '3001'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ── Web (Next.js) ─────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    container_name: agencyos_web
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - agencyos_net
    expose:
      - '3000'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ── Nginx (Reverse Proxy) ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agencyos_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - web
      - api
    networks:
      - agencyos_net
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
